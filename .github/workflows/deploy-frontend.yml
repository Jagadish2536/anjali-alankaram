name: Deploy Frontend to Amazon ECS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: anjali-alankaram-frontend
  ECS_SERVICE: anjali-alankaram-frontend-service
  ECS_CLUSTER: anjali-alankaram-cluster
  ECS_TASK_DEFINITION: anjali-alankaram-frontend-task
  CONTAINER_NAME: frontend
  RDS_INSTANCE: anjali-alankaram-db-wiped

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Fetch Frontend Secrets from AWS
      id: fetch-secrets
      run: |
        echo "Fetching secrets from ap-south-2..."
        SECRETS=$(aws secretsmanager get-secret-value --secret-id anjali-alankaram-frontend-env --region ${{ env.AWS_REGION }} --query SecretString --output text)
        
        if [ -z "$SECRETS" ]; then
          echo "Error: Could not fetch secrets from AWS"
          exit 1
        fi

        API_URL=$(echo $SECRETS | jq -r '.NEXT_PUBLIC_API_URL')
        RAZORPAY_KEY=$(echo $SECRETS | jq -r '.NEXT_PUBLIC_RAZORPAY_KEY_ID')
        GOOGLE_ID=$(echo $SECRETS | jq -r '.NEXT_PUBLIC_GOOGLE_CLIENT_ID')

        echo "NEXT_PUBLIC_API_URL=$API_URL" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_RAZORPAY_KEY_ID=$RAZORPAY_KEY" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$GOOGLE_ID" >> $GITHUB_ENV
        
        # Mask secrets in logs for security
        echo "::add-mask::$API_URL"
        echo "::add-mask::$RAZORPAY_KEY"
        echo "::add-mask::$GOOGLE_ID"
        
        echo "DEBUG: Google ID starts with ${GOOGLE_ID:0:10}..."

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd frontend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          --build-arg NEXT_PUBLIC_API_URL="${{ env.NEXT_PUBLIC_API_URL }}" \
          --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID="${{ env.NEXT_PUBLIC_RAZORPAY_KEY_ID }}" \
          --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ env.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current Amazon ECS task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
