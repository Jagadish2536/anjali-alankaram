name: Deploy Backend to Amazon ECS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: anjali-alankaram-backend
  ECS_SERVICE: anjali-alankaram-backend-service
  ECS_CLUSTER: anjali-alankaram-cluster
  ECS_TASK_DEFINITION: anjali-alankaram-backend-task
  CONTAINER_NAME: backend
  RDS_INSTANCE: anjali-alankaram-db-wiped

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        mask-aws-account-id: 'false'

    # ── Pre-deployment DB Snapshot ─────────────────────────────────────────
    # Takes a snapshot BEFORE any code or schema changes land.
    # Kept for 24 hours then auto-deleted. Blocks deploy if snapshot fails.
    - name: Snapshot RDS before deployment
      id: snapshot
      continue-on-error: true  # Don't block deploy if RDS is stopped/unavailable
      run: |
        TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
        SNAPSHOT_ID="pre-deploy-backend-${TIMESTAMP}"
        echo "snapshot_id=$SNAPSHOT_ID" >> $GITHUB_OUTPUT

        echo "📸 Creating RDS snapshot: $SNAPSHOT_ID"
        aws rds create-db-snapshot \
          --db-instance-identifier ${{ env.RDS_INSTANCE }} \
          --db-snapshot-identifier $SNAPSHOT_ID \
          --region ${{ env.AWS_REGION }}

        echo "⏳ Waiting for snapshot to be available..."
        aws rds wait db-snapshot-available \
          --db-snapshot-identifier $SNAPSHOT_ID \
          --region ${{ env.AWS_REGION }}

        echo "✅ Snapshot ready: $SNAPSHOT_ID"

    # (AWS credentials already configured above)

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # DB schema sync (prisma db push --accept-data-loss=false) runs in
    # entrypoint.sh at container startup — additive only, never drops data.

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "DEBUG: Registry is $ECR_REGISTRY"
        echo "DEBUG: Repository is $ECR_REPOSITORY"
        echo "DEBUG: Full Tag is $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        cd backend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        # Also tag as :latest so ECS can always pull fresh
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current Amazon ECS task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_DEFINITION }} \
          --query 'taskDefinition' \
          --output json \
          | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
          > task-definition.json
        echo "Task definition downloaded and cleaned."
        echo "Family: $(jq -r '.family' task-definition.json) | CPU: $(jq -r '.cpu' task-definition.json)"

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Register new task definition
      id: register-task-def
      run: |
        TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
          --query taskDefinition.taskDefinitionArn --output text)
        echo "DEBUG: Registered ARN is $TASK_DEFINITION_ARN"
        if [ -z "$TASK_DEFINITION_ARN" ]; then
          echo "Failed to register task definition"
          exit 1
        fi
        echo "task_definition_arn=$TASK_DEFINITION_ARN" >> $GITHUB_OUTPUT

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # ── Auto-delete snapshots older than 24 hours ──────────────────────────
    # Runs after successful deployment only.
    # Lists all pre-deploy-backend-* snapshots, deletes ones older than 1 day.
    - name: Cleanup old pre-deploy snapshots (keep 24h)
      if: success()
      run: |
        echo "🧹 Cleaning up pre-deploy snapshots older than 24 hours..."

        # Get cutoff time = now - 24 hours (in seconds)
        CUTOFF=$(date -u -d '24 hours ago' +%s 2>/dev/null || date -u -v-24H +%s)

        # List all pre-deploy-backend snapshots
        SNAPSHOTS=$(aws rds describe-db-snapshots \
          --region ${{ env.AWS_REGION }} \
          --snapshot-type manual \
          --query "DBSnapshots[?starts_with(DBSnapshotIdentifier, 'pre-deploy-backend-')].{id:DBSnapshotIdentifier,time:SnapshotCreateTime}" \
          --output json)

        echo "Found snapshots: $SNAPSHOTS"

        # Loop and delete anything older than 24h
        echo "$SNAPSHOTS" | jq -r '.[] | "\(.time) \(.id)"' | while read SNAP_TIME SNAP_ID; do
          SNAP_EPOCH=$(date -u -d "$SNAP_TIME" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "${SNAP_TIME%%.*}" +%s 2>/dev/null || echo 0)
          if [ "$SNAP_EPOCH" -lt "$CUTOFF" ] && [ "$SNAP_EPOCH" -gt 0 ]; then
            echo "🗑️  Deleting old snapshot: $SNAP_ID (created: $SNAP_TIME)"
            aws rds delete-db-snapshot \
              --db-snapshot-identifier "$SNAP_ID" \
              --region ${{ env.AWS_REGION }}
          else
            echo "✅ Keeping snapshot: $SNAP_ID (within 24h)"
          fi
        done

        echo "🧹 Cleanup complete"
