name: Deploy Backend to Amazon ECS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: anjali-alankaram-backend
  ECS_SERVICE: anjali-alankaram-backend-service
  ECS_CLUSTER: anjali-alankaram-cluster
  ECS_TASK_DEFINITION: anjali-alankaram-backend-task
  CONTAINER_NAME: backend

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        mask-aws-account-id: 'false'

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # DB schema sync (prisma db push --accept-data-loss=false) runs in
    # entrypoint.sh at container startup — additive only, never drops data.

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "DEBUG: Registry is $ECR_REGISTRY"
        echo "DEBUG: Repository is $ECR_REPOSITORY"
        echo "DEBUG: Full Tag is $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        cd backend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current Amazon ECS task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} --query taskDefinition > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Register new task definition
      id: register-task-def
      run: |
        TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
          --query taskDefinition.taskDefinitionArn --output text)
        echo "DEBUG: Registered ARN is $TASK_DEFINITION_ARN"
        if [ -z "$TASK_DEFINITION_ARN" ]; then
          echo "Failed to register task definition"
          exit 1
        fi
        echo "task_definition_arn=$TASK_DEFINITION_ARN" >> $GITHUB_OUTPUT

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
