user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    
    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstreams
    upstream backend {
        server backend:3000;
    }

    upstream frontend {
        server frontend:4000;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name anjalialankaram.com www.anjalialankaram.com api.anjalialankaram.com;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API Server (HTTPS)
    server {
        listen 443 ssl;
        server_name api.anjalialankaram.com;

        # SSL Certificates (managed by Certbot)
        # ssl_certificate /etc/letsencrypt/live/api.anjalialankaram.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/api.anjalialankaram.com/privkey.pem;

        # SSE Location - disable proxy buffering and extend timeout
        location ~ ^/api/v[0-9]+/settings/sse$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE specific headers & configuration
            proxy_buffering off;
            proxy_cache_off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            keepalive_timeout 3600s;
        }

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Frontend Server (HTTPS) - non-www canonical
    server {
        listen 443 ssl;
        server_name anjalialankaram.com;

        # SSL Certificates
        # ssl_certificate /etc/letsencrypt/live/anjalialankaram.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/anjalialankaram.com/privkey.pem;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # www redirect to non-www
    server {
        listen 443 ssl;
        server_name www.anjalialankaram.com;

        # SSL Certificates
        # ssl_certificate /etc/letsencrypt/live/anjalialankaram.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/anjalialankaram.com/privkey.pem;

        return 301 https://anjalialankaram.com$request_uri;
    }
}
